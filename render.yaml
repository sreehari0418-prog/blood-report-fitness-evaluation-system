services:
  # Unified Backend (Authentication + ML Analysis + OCR)
  - type: web
    name: blood-report-fitness-evaluation-system
    env: docker
    region: singapore
    dockerContext: ./python-backend
    dockerFilePath: ./python-backend/Dockerfile
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
    autoDeploy: true
